<script>
function mkRng(seed){let s=seed;return()=>{s=(s*16807)%2147483647;return s/2147483647;};}

(function(){
  const cv=document.getElementById('curves'),cx=cv.getContext('2d');
  const DPR=Math.min(window.devicePixelRatio||1,2);
  let W,H;
  function resize(){
    W=innerWidth;H=innerHeight;
    cv.width=W*DPR;cv.height=H*DPR;
    cv.style.width=W+'px';cv.style.height=H+'px';
    cx.setTransform(DPR,0,0,DPR,0,0);
  }
  resize();
  window.addEventListener('resize',resize);

  // Real historical OHLC bars (bond + commodity futures), baked into a static
  // JSON file by web/assets/_extract_cover_data.py — not synthetic data.
  const PANELS=[
    {key:'TL2603', up:'69,182,230',  dn:'231,76,60', base:.60, amp:.17},
    {key:'RB2605', up:'39,174,96',   dn:'231,76,60', base:.30, amp:.13},
  ];
  const candleW=6,gap=2.5;
  let startT=null;

  fetch('/dashboard/assets/cover-data.json').then(r=>r.json()).then(data=>{
    PANELS.forEach(p=>{p.bars=data[p.key]||[];});
    requestAnimationFrame(draw);
  }).catch(()=>{});

  function draw(t){
    if(startT===null)startT=t;
    const el=t-startT;
    cx.clearRect(0,0,W,H);
    PANELS.forEach(p=>{
      const bars=p.bars;if(!bars||!bars.length)return;
      const n=bars.length;
      const step=candleW+gap;
      const pxPerMs=0.012;                         // slow, steady drift
      const span=step*n;
      const offset=(el*pxPerMs)%span;
      const firstIdx=Math.floor(offset/step);
      const subPx=offset-firstIdx*step;
      const count=Math.ceil(W/step)+2;
      const yTop=H*(p.base-p.amp),yBot=H*(p.base+p.amp);
      for(let i=0;i<count;i++){
        const idx=((firstIdx+i)%n+n)%n;
        const b=bars[idx];if(!b)continue;
        const [o,h,l,c]=b;
        const x=i*step-subPx;
        const yO=yBot-o*(yBot-yTop),yH=yBot-h*(yBot-yTop);
        const yL=yBot-l*(yBot-yTop),yC=yBot-c*(yBot-yTop);
        const up=c>=o;
        const col=up?p.up:p.dn;
        cx.strokeStyle=`rgba(${col},.40)`;
        cx.lineWidth=1;
        cx.beginPath();cx.moveTo(x+candleW/2,yH);cx.lineTo(x+candleW/2,yL);cx.stroke();
        const bodyTop=Math.min(yO,yC),bodyH=Math.max(Math.abs(yC-yO),1);
        cx.fillStyle=`rgba(${col},${up?.22:.30})`;
        cx.fillRect(x,bodyTop,candleW,bodyH);
      }
    });
    requestAnimationFrame(draw);
  }
})();

const cv=document.getElementById('globe'),gx=cv.getContext('2d');
const DPR=Math.min(window.devicePixelRatio||1,2);
const SZ=Math.min(innerWidth*.9,(innerHeight-72)*.92);
cv.width=SZ*DPR;cv.height=SZ*DPR;
cv.style.width=SZ+'px';cv.style.height=SZ+'px';
gx.scale(DPR,DPR);
const CX=SZ/2,CY=SZ/2,R=SZ*.43;
let rot=.7;
const CITIES=[
  {n:'New York', lat:40.7, lon:-74.0, c:'#2e86c1'},
  {n:'London',   lat:51.5, lon:-0.1,  c:'#45b6e6'},
  {n:'Tokyo',    lat:35.7, lon:139.7, c:'#27ae60'},
  {n:'Shanghai', lat:31.2, lon:121.5, c:'#27ae60'},
  {n:'Hong Kong',lat:22.3, lon:114.2, c:'#f39c12'},
  {n:'Singapore',lat:1.3,  lon:103.8, c:'#f39c12'},
  {n:'Frankfurt',lat:50.1, lon:8.7,   c:'#45b6e6'},
  {n:'Chicago',  lat:41.9, lon:-87.6, c:'#2e86c1'},
  {n:'Sydney',   lat:-33.9,lon:151.2, c:'#e67e22'},
  {n:'Dubai',    lat:25.2, lon:55.3,  c:'#e67e22'},
  {n:'Zurich',   lat:47.4, lon:8.5,   c:'#8e44ad'},
  {n:'São Paulo',lat:-23.5,lon:-46.6, c:'#27ae60'},
];
const ARCS=[
  ['New York','London',    [69,182,230,.50]],
  ['London','Frankfurt',   [69,182,230,.40]],
  ['London','Zurich',      [142,68,173,.42]],
  ['London','Dubai',       [230,126,34,.36]],
  ['Tokyo','Shanghai',     [39,174,96,.52]],
  ['Shanghai','Hong Kong', [39,174,96,.42]],
  ['Hong Kong','Singapore',[243,156,18,.52]],
  ['Singapore','Dubai',    [230,126,34,.42]],
  ['New York','Chicago',   [46,134,193,.42]],
  ['New York','São Paulo', [39,174,96,.30]],
  ['Tokyo','Sydney',       [230,126,34,.36]],
  ['London','Tokyo',       [69,182,230,.25]],
];
let landRings=[];
fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json')
  .then(r=>r.json())
  .then(world=>{
    if(typeof topojson==='undefined')return;
    const land=topojson.feature(world,world.objects.land);
    const geom=land.geometry;
    const polys=geom.type==='MultiPolygon'?geom.coordinates:geom.type==='Polygon'?[geom.coordinates]:[];
    landRings=polys.map(p=>p[0]).filter(r=>r.length>10);
  }).catch(()=>{});
function proj(lat,lon){
  const phi=lat*Math.PI/180,lam=lon*Math.PI/180-rot;
  const x=Math.cos(phi)*Math.sin(lam),y=-Math.sin(phi),z=Math.cos(phi)*Math.cos(lam);
  return{x:CX+R*x,y:CY+R*y,z};
}
function gcPts(la1,lo1,la2,lo2,n){
  const r=d=>d*Math.PI/180;
  const A=(p,l)=>[Math.cos(r(p))*Math.cos(r(l)),Math.cos(r(p))*Math.sin(r(l)),Math.sin(r(p))];
  const [a,b]=[A(la1,lo1),A(la2,lo2)];
  return Array.from({length:n+1},(_,i)=>{
    const t=i/n,v=a.map((x,j)=>x+t*(b[j]-x));
    const len=Math.sqrt(v.reduce((s,x)=>s+x*x,0)),[xv,yv,zv]=v.map(x=>x/len);
    return{lat:Math.asin(zv)*180/Math.PI,lon:Math.atan2(yv,xv)*180/Math.PI};
  });
}
function hexRgb(h){return[0,2,4].map(i=>parseInt(h.slice(1+i,3+i),16));}
function drawGlobe(){
  gx.clearRect(0,0,SZ,SZ);
  gx.save();
  gx.beginPath();gx.arc(CX,CY,R,0,Math.PI*2);gx.clip();
  const bg=gx.createRadialGradient(CX-R*.22,CY-R*.22,0,CX,CY,R);
  bg.addColorStop(0,'rgba(20,52,122,.96)');
  bg.addColorStop(.55,'rgba(8,26,72,.93)');
  bg.addColorStop(1,'rgba(3,10,32,.96)');
  gx.fillStyle=bg;gx.fillRect(0,0,SZ,SZ);
  const gs=(f,c)=>{gx.strokeStyle=c;gx.lineWidth=.5;gx.stroke();};
  for(let lat=-80;lat<=80;lat+=20){
    gx.beginPath();let f=true;
    for(let lo=-180;lo<=180;lo+=2){const p=proj(lat,lo);if(p.z<0){f=true;continue;}f?gx.moveTo(p.x,p.y):gx.lineTo(p.x,p.y);f=false;}
    gs(f,'rgba(69,182,230,.07)');
  }
  for(let lo=-180;lo<180;lo+=20){
    gx.beginPath();let f=true;
    for(let lat=-90;lat<=90;lat+=2){const p=proj(lat,lo);if(p.z<0){f=true;continue;}f?gx.moveTo(p.x,p.y):gx.lineTo(p.x,p.y);f=false;}
    gs(f,'rgba(69,182,230,.07)');
  }
  if(landRings.length){
    landRings.forEach(ring=>{
      // Draw each visible (front-facing) arc of the ring as its own subpath —
      // filling a polygon that's been cut by the horizon produces wrong,
      // murky shapes, so render the coastline as a clean outline instead.
      gx.beginPath();let drawing=false;
      ring.forEach(([lo,la])=>{
        const p=proj(la,lo);
        if(p.z<0){drawing=false;return;}
        if(!drawing){gx.moveTo(p.x,p.y);drawing=true;}
        else gx.lineTo(p.x,p.y);
      });
      gx.strokeStyle='rgba(140,190,245,.55)';gx.lineWidth=.85;gx.stroke();
    });
  }
  ARCS.forEach(([fr,to,[r,g,b,a]])=>{
    const c1=CITIES.find(c=>c.n===fr),c2=CITIES.find(c=>c.n===to);if(!c1||!c2)return;
    const pts=gcPts(c1.lat,c1.lon,c2.lat,c2.lon,60);
    gx.beginPath();let dr=false;
    pts.forEach(pt=>{const p=proj(pt.lat,pt.lon);if(p.z<0){dr=false;return;}if(!dr){gx.moveTo(p.x,p.y);dr=true;}else gx.lineTo(p.x,p.y);});
    gx.strokeStyle=`rgba(${r},${g},${b},${a})`;gx.lineWidth=1.3;gx.stroke();
  });
  CITIES.forEach(city=>{
    const p=proj(city.lat,city.lon);if(p.z<.04)return;
    const [r,g,b]=hexRgb(city.c);
    const glow=gx.createRadialGradient(p.x,p.y,0,p.x,p.y,11);
    glow.addColorStop(0,`rgba(${r},${g},${b},.65)`);glow.addColorStop(1,`rgba(${r},${g},${b},0)`);
    gx.beginPath();gx.arc(p.x,p.y,11,0,Math.PI*2);gx.fillStyle=glow;gx.fill();
    gx.beginPath();gx.arc(p.x,p.y,2.5,0,Math.PI*2);gx.fillStyle=city.c;gx.fill();
  });
  gx.font='9px monospace';gx.textBaseline='middle';
  CITIES.forEach(city=>{
    const p=proj(city.lat,city.lon);if(p.z<.18)return;
    gx.fillStyle=`rgba(255,255,255,${Math.min(.68,p.z*.82)})`;gx.fillText(city.n,p.x+5,p.y);
  });
  const limb=gx.createRadialGradient(CX,CY,R*.68,CX,CY,R);
  limb.addColorStop(.78,'rgba(69,182,230,0)');limb.addColorStop(1,'rgba(69,182,230,.24)');
  gx.fillStyle=limb;gx.fillRect(0,0,SZ,SZ);
  gx.restore();
  const atmo=gx.createRadialGradient(CX,CY,R*.87,CX,CY,R*1.12);
  atmo.addColorStop(0,'rgba(69,182,230,.16)');atmo.addColorStop(1,'rgba(69,182,230,0)');
  gx.beginPath();gx.arc(CX,CY,R*1.12,0,Math.PI*2);gx.fillStyle=atmo;gx.fill();
  rot+=.0018;
  requestAnimationFrame(drawGlobe);
}
drawGlobe();
const TICKERS=[
  {n:'10Y UST',v:'4.42%', d:'+2.3bp',up:true, seed:11,tr:.018},
  {n:'CSI 300',v:'3,892', d:'-0.14%',up:false,seed:22,tr:-.014},
  {n:'DXY',    v:'104.2', d:'+0.08%',up:true, seed:33,tr:.006},
  {n:'Gold',   v:'$2,316',d:'+0.22%',up:true, seed:44,tr:.020},
  {n:'WTI',    v:'$78.4', d:'-0.31%',up:false,seed:55,tr:-.018},
  {n:'VIX',    v:'13.2',  d:'-4.8%', up:false,seed:66,tr:-.026},
];
const tickerEl=document.getElementById('ticker');
const sparks=[];
TICKERS.forEach(t=>{
  const wrap=document.createElement('div');wrap.className='tick';
  const cnv=document.createElement('canvas');cnv.width=68;cnv.height=34;
  cnv.style.cssText='width:68px;height:34px;flex-shrink:0';
  const info=document.createElement('div');info.className='tick-info';
  info.innerHTML=`<span class="tick-n">${t.n}</span><span class="tick-v">${t.v}</span><span class="tick-d ${t.up?'up':'dn'}">${t.d}</span>`;
  wrap.appendChild(cnv);wrap.appendChild(info);tickerEl.appendChild(wrap);
  const rng=mkRng(t.seed);
  let v=0,data=[];
  for(let i=0;i<52;i++){v+=(rng()-.5)*.38+t.tr;data.push(v);}
  sparks.push({cnv,data,up:t.up,rng,tr:t.tr});
});
function drawSpark(cnv,data,up){
  const sx=cnv.getContext('2d'),W=68,H=34,n=data.length;
  const mn=Math.min(...data),mx=Math.max(...data),rg=mx-mn||.001;
  const toY=v=>H-((v-mn)/rg)*(H-4)-2;
  const col=up?[39,174,96]:[231,76,60];
  sx.clearRect(0,0,W,H);
  const gr=sx.createLinearGradient(0,0,0,H);
  gr.addColorStop(0,`rgba(${col},0.28)`);gr.addColorStop(1,`rgba(${col},0)`);
  sx.beginPath();
  data.forEach((v,i)=>{const x=i/(n-1)*(W-1);i?sx.lineTo(x,toY(v)):sx.moveTo(x,toY(v));});
  sx.lineTo(W-1,H);sx.lineTo(0,H);sx.closePath();sx.fillStyle=gr;sx.fill();
  sx.beginPath();
  data.forEach((v,i)=>{const x=i/(n-1)*(W-1);i?sx.lineTo(x,toY(v)):sx.moveTo(x,toY(v));});
  sx.strokeStyle=`rgba(${col},0.85)`;sx.lineWidth=1.5;sx.stroke();
  sx.beginPath();sx.arc(W-1,toY(data[n-1]),2,0,Math.PI*2);
  sx.fillStyle=`rgb(${col})`;sx.fill();
}
sparks.forEach(s=>drawSpark(s.cnv,s.data,s.up));
setInterval(()=>{
  sparks.forEach(s=>{
    s.data.shift();
    s.data.push(s.data[s.data.length-1]+(s.rng()-.5)*.38+s.tr);
    drawSpark(s.cnv,s.data,s.up);
  });
},1800);
</script>
